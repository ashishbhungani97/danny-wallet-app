name: Build Android APK

on:
push:
branches: [ main ]
pull_request:
branches: [ main ]

jobs:
build-android:
runs-on: ubuntu-latest

```
steps:
  # 1. Checkout repo
  - name: Checkout code
    uses: actions/checkout@v4

  # 2. Setup Node.js (v16)
  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 16
      cache: 'npm'

  # 3. Setup Java (JDK 11)
  - name: Setup Java
    uses: actions/setup-java@v4
    with:
      distribution: 'temurin'
      java-version: '11'

  # 4. Install dependencies
  - name: Install dependencies
    run: npm install

  # 5. Fix React Native SVG issue (your postinstall already handles it, but safe)
  - name: Clean duplicate SVG dependency
    run: rm -rf node_modules/react-native-svg-flagkit/node_modules/react-native-svg

  # 6. Cache Gradle
  - name: Cache Gradle
    uses: actions/cache@v4
    with:
      path: |
        ~/.gradle/caches
        ~/.gradle/wrapper
      key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
      restore-keys: |
        gradle-${{ runner.os }}

  # 7. Give execute permission to gradlew
  - name: Make gradlew executable
    run: chmod +x android/gradlew

  # 8. Build APK (debug)
  - name: Build Debug APK
    run: |
      cd android
      ./gradlew assembleDebug

  # 9. Upload APK artifact
  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: app-debug-apk
      path: android/app/build/outputs/apk/debug/app-debug.apk
```
