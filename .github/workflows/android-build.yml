name: Android Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node 16 ───────────────────────────────────────────────────
      - name: Set up Node.js 16
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'npm'

      # ── 3. Set up Java 11 ───────────────────────────────────────────────────
      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      # ── 4. Cache Gradle dependencies ────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 5. Install JS dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 6. (Optional) Run lint & tests ─────────────────────────────────────
      # Uncomment the lines below if you want lint/test gates before build
      # - name: Lint
      #   run: npm run lint
      # - name: Test
      #   run: npm test -- --passWithNoTests

      # ── 7. Make gradlew executable ──────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 8. Build release APK ────────────────────────────────────────────────
      - name: Build Android Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # ── 9. Sign the APK (optional – requires secrets) ───────────────────────
      # To enable signing, add these secrets in GitHub → Settings → Secrets:
      #   KEYSTORE_BASE64    → base64-encoded .keystore file
      #   KEY_ALIAS          → key alias
      #   KEY_PASSWORD       → key password
      #   STORE_PASSWORD     → store password
      #
      # Then uncomment this step:
      # - name: Sign APK
      #   uses: r0adkll/sign-android-release@v1
      #   with:
      #     releaseDirectory: android/app/build/outputs/apk/release
      #     signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
      #     alias: ${{ secrets.KEY_ALIAS }}
      #     keyStorePassword: ${{ secrets.STORE_PASSWORD }}
      #     keyPassword: ${{ secrets.KEY_PASSWORD }}

      # ── 10. Upload APK as artifact ──────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lmwallet-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7